  <circle cx="22" cy="18" r="1.5" fill="#a78bfa"/>
  <circle cx="13" cy="21" r="1.5" fill="#a78bfa"/>
  <!-- 뉴런 연결선 -->
  <line x1="12" y1="14" x2="17" y2="20" stroke="#8b5cf6" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="11" x2="17" y2="20" stroke="#8b5cf6" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="20" x2="22" y2="18" stroke="#7c3aed" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="20" x2="13" y2="21" stroke="#7c3aed" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="14" x2="20" y2="11" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
  <line x1="22" y1="18" x2="20" y2="11" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
  <!-- 스파크 -->
