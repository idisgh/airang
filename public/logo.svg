<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" fill="none">
  <!-- 돋보기 원형 - 상단 갭 + 우측하단 갭 (화살표와 손잡이 연결부) -->
  <!-- 왼쪽 큰 호 -->
  <path d="M 85 20 A 85 85 0 1 0 162 145" stroke="#5B4DC0" stroke-width="20" stroke-linecap="round" fill="none"/>
  <!-- 오른쪽 작은 호 -->
  <path d="M 115 20 A 85 85 0 0 1 162 135" stroke="#5B4DC0" stroke-width="20" stroke-linecap="round" fill="none"/>
  
  <!-- 손잡이 (우측하단 호에서 자연스럽게 연결) -->
  <line x1="165" y1="142" x2="190" y2="212" stroke="#5B4DC0" stroke-width="20" stroke-linecap="round"/>
  
  <!-- 화살표 커서 (돋보기 안 + 꼭짓점이 원 관통) -->
  <path d="
    M 100 24
    L 55 132
    L 100 105
    L 145 132
    Z
  " fill="#5B4DC0"/>
</svg>
