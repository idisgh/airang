<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0.25"/>
    </linearGradient>
  </defs>
  <!-- 돋보기 원 -->
  <circle cx="17" cy="17" r="12" stroke="url(#grad)" stroke-width="3" fill="url(#lens)"/>
  <!-- 돋보기 손잡이 -->
  <line x1="26" y1="26" x2="35" y2="35" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <!-- AI 뉴런 노드들 -->
  <circle cx="12" cy="14" r="2" fill="#6366f1"/>
  <circle cx="20" cy="11" r="2" fill="#8b5cf6"/>
